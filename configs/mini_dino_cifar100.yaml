# =============================================================================
# Mini DINO training on CIFAR-100.
#
# Scope: a deliberately small self-supervised pretraining run intended as a
# pedagogical demonstration of the DINO mechanism. Do NOT expect results
# comparable to the public DINOv2 checkpoints (which are trained on LVD-142M).
#
# Assumed hardware: single GPU with ~12-24 GB VRAM.
# Runtime estimate at defaults: ~1 hour on a T4, ~20 min on a 3090/4090.
# =============================================================================

experiment:
  name: mini_dino_cifar100
  seed: 42
  output_dir: results/logs/mini_dino
  notes: |
    ViT-Tiny (patch size 4) on 32x32 CIFAR-100. Two global crops (size 32),
    six local crops (size 16). ~30 minutes of training on a single modern GPU.

# ---------------- Data ----------------
data:
  dataset: cifar100
  root: ${env:DATASETS_DIR}/cifar100   # falls back to "/cifar100" if env unset
  download: true
  num_workers: 4
  batch_size: 128                      # global batch size; AMP keeps memory reasonable
  pin_memory: true

  # Multi-crop augmentation
  augmentation:
    global_size: 32
    local_size: 16
    n_global_crops: 2
    n_local_crops: 6
    global_scale: [0.4, 1.0]
    local_scale: [0.05, 0.4]

# ---------------- Model ----------------
model:
  backbone: vit_tiny        # {vit_tiny, vit_small}
  patch_size: 4             # CIFAR is 32x32; patch 4 gives 64 tokens
  drop_path_rate: 0.1

  head:
    out_dim: 4096           # K (DINO head prototype dim). Original is 65536;
                            #     we reduce for the mini-scale setting.
    hidden_dim: 2048
    bottleneck_dim: 256
    norm_last_layer: true

# ---------------- Loss ----------------
loss:
  student_temp: 0.1
  teacher_temp_start: 0.04
  teacher_temp_end: 0.07
  teacher_temp_warmup_epochs: 10
  center_momentum: 0.9

# ---------------- Optimizer & schedules ----------------
optim:
  optimizer: adamw
  base_lr: 0.0005           # peak LR after warmup (before batch-size scaling)
  min_lr: 0.00001
  warmup_epochs: 5
  weight_decay: 0.04
  weight_decay_end: 0.4
  clip_grad: 3.0
  freeze_last_layer_epochs: 1

# Teacher EMA momentum schedule (cosine from base to 1.0)
ema:
  base_momentum: 0.996
  final_momentum: 1.0

# ---------------- Training schedule ----------------
training:
  epochs: 60
  use_amp: true
  log_every: 20
  save_every_epochs: 10
  eval_every_epochs: 5      # knn eval on CIFAR-100 test set

# ---------------- Evaluation ----------------
eval:
  knn_k: 20
  knn_temperature: 0.07
