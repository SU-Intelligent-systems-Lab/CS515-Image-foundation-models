# Mask2Former inference on ADE20k with DINOv3 ViT-7B
# Reproduces DINOv3 Paper Section 6.3.2 (Table 11)
#
# Paper result: 62.6 mIoU (single-scale), 63.0 mIoU (TTA)
# Requires: H100 or A100 80GB GPU

dataset_name: "ade20k"
dataset_root: "data/ADEChallengeData2016"
num_classes: 150

backbone_weights: "weights/dinov3_vit7b16.pth"
m2f_weights: "weights/dinov3_vit7b16_m2f_head.pth"
autocast_dtype: "bfloat16"

# Inference settings (from config-ade20k-m2f-inference.yaml)
eval_crop_size: 896
eval_stride: 596

# Test-time augmentation
use_tta: false                  # Set to true for full TTA (paper: 63.0 mIoU)
tta_ratios: [0.9, 0.95, 1.0, 1.05, 1.1]

output_dir: "results/m2f_inference/ade20k_vit7b"
