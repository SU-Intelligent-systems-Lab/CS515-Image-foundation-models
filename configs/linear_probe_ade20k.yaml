# Linear probe segmentation on ADE20k
# Reproduces DINOv3 Paper Section 6.1.2 (Table 3)
#
# Expected result with ViT-L/16: ~54.9 mIoU
# Paper result with ViT-7B/16:    55.9 mIoU

dataset_name: "ade20k"
dataset_root: "data/ADEChallengeData2016"
num_classes: 150

backbone_name: "vitl16"
weights_path: "weights/dinov3_vitl16.pth"
autocast_dtype: "float32"

batch_size: 2
total_iterations: 40000
learning_rate: 1e-3
weight_decay: 1e-3
warmup_iterations: 1500

eval_interval: 5000
eval_crop_size: 512
eval_stride: 341
img_size: 512

output_dir: "results/linear_probe/ade20k_vitl16"
