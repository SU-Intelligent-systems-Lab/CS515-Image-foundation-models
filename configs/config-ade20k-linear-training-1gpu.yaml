# =============================================================================
# Single-GPU variant of Meta's linear-head ADE20K training config.
#
# This file follows the schema of
#   dinov3/eval/segmentation/configs/config-ade20k-linear-training.yaml
# in the official DINOv3 repository. It is loaded by the same training entry
# point (`dinov3.eval.segmentation.run`).
#
# Why a separate config?
#   Meta's reference config is written for an 8-GPU setup. Running it as-is on
#   a single GPU will OOM on most cards because of the global batch size and
#   image size. This file reduces only the hardware-related fields:
#     - n_gpus:                8     -> 1
#     - bs (per-GPU batch):    2     -> 1
#     - transforms.train.img_size:   reduced default 512 still fits ViT-S/B;
#                                    if you OOM with ViT-L, drop to 448.
#   Algorithmic settings (optimizer, scheduler, loss, head type, eval protocol)
#   are unchanged from Meta's reference; do not edit them here.
#
# How to launch:
#   PYTHONPATH=$PWD python -m dinov3.eval.segmentation.run \
#     --config-file ../dinov3_segmentation/configs/config-ade20k-linear-training-1gpu.yaml \
#     datasets.root=/path/to/ADEChallengeData2016/parent
#
# =============================================================================

# --- Hardware / batch -------------------------------------------------------
bs: 1                           # per-GPU batch size
n_gpus: 1                       # adjust if you have more
metric_to_save: "mIoU"
model_dtype: FLOAT32

# --- Scheduler (UNCHANGED from Meta's reference recipe) ---------------------
scheduler:
  total_iter: 40000
  type: "WarmupOneCycleLR"
  constructor_kwargs:
    warmup_iters: 1500
    warmup_ratio: 1.0e-6
    final_div_factor: .inf
    pct_start: 0
    anneal_strategy: "cos"
    use_beta1: false
    update_momentum: false

# --- Optimizer (UNCHANGED from Meta's reference recipe) ---------------------
optimizer:
  lr: 1.0e-3
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-3
  gradient_clip: "inf"

# --- Datasets ---------------------------------------------------------------
# `root` is supplied on the command line: append `datasets.root=/path` to the
# launch command. The training/validation split strings are Meta's adapters.
datasets:
  root: ""
  train: "ADE20K:split=TRAIN"
  val:   "ADE20K:split=VAL"

# --- Loss weights (UNCHANGED) -----------------------------------------------
train:
  diceloss_weight: 0.0
  celoss_weight: 1.0

# --- Head architecture (UNCHANGED) ------------------------------------------
decoder_head:
  type: "linear"
  backbone_out_layers: LAST
  use_cls_token: false
  use_batchnorm: true
  use_backbone_norm: true
  num_classes: 150

# --- Train transforms (size reduced; range and flip prob unchanged) ---------
transforms:
  train:
    img_size: 512               # drop to 448 if you OOM
    random_img_size_ratio_range: [0.5, 2.0]
    crop_size: [512, 512]       # set crop_size == img_size
    flip_prob: 0.5
  eval:
    img_size: 512

# --- Eval protocol (UNCHANGED) ----------------------------------------------
eval:
  compute_metric_per_image: false
  reduce_zero_label: true
  mode: "slide"
  crop_size: 512
  stride: 341
  eval_interval: 5000
  use_tta: false
